<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="vcf.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>UG AFFILIATED L100 CONTACTS</title>
  </head>
  <body>
    <div class="glass-card">
      <div class="container">
        <header>
          <h1>UG AFFILIATED L100 VCF</h1>
        </header>
      </div>
      <div class="input-group">
        <form class="contact-reg">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" placeholder="John Doe" required />
          <label for="phonenumber">Phone Number</label>
          <div class="phone-group">
            <span class="country-code">+233</span>

              <input
                type="tel"
                id="phonenumber"
                placeholder="531234567"
                maxlength="9"
                inputmode="numeric"
                pattern="[0-9]*"
                required
              />
          </div>
          <label for="college">College</label>
          <select id="college" required>
            <option value="">Select your college</option>
            <option value="AMECO">E.P College Of Edu. Amedzofe</option>
            <option value="AcCE">Accra College Of Edu</option>
            <option value="ENCHICO">Enchi College Of Edu</option>
            <option value="GBEWAA">Gbewaa College Of Edu</option>
            <option value="GOVCO">Peki College Of Edu</option>
            <option value="MOUNT MARY">Mount Mary College Of Edu</option>
          </select>
          <label id="math-question"></label>
            <input type="number" id="math-answer" placeholder="Your answer" required />
          <br />
          <button id="submit-form" type="submit">Submit</button>
        </form>
      </div>
      <footer>
        <p>
          &copy; ANONYMOUS' 2026 UG AFFILIATED L100 CONTACTS. All rights
          reserved.
        </p>
      </footer>
    </div>
    <script src="vcf.js"></script>
  </body>
</html>
